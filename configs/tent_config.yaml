# TENT Test-Time Adaptation hyperparameters

lr: 0.001        # Learning rate for BN parameter updates
steps: 1         # Gradient steps per batch (1 = standard TENT setting)
momentum: 0.9    # SGD momentum for BN updates
batch_size: 16   # Inference batch size

# Notes:
# - steps=1 is the original TENT paper setting; prevents over-adaptation
# - Increasing steps may help with severe shifts but risks instability
# - lr=0.001 is a safe starting point; reduce to 1e-4 if mAP degrades vs baseline
