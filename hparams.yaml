run_name: sh17_yolov8m

# Set to a path to skip training and use existing weights.
# Example: "runs/train/sh17_yolov8m/weights/best.pt"
pretrained_weights: null

train:
  # Hardware — V100 32GB, 128-core CPU, 377GB RAM
  device: 0
  batch: 64       # V100 32GB handles YOLOv8m@640 comfortably at 64
  workers: 32     # safe with 128 cores and ample RAM
  amp: true       # V100 Tensor Cores, use fp16

  # Schedule
  epochs: 50
  imgsz: 640
  optimizer: SGD
  lr0: 0.02       # above YOLO default (0.01); warmup_epochs=3 keeps early training stable
  lrf: 0.01
  warmup_epochs: 3
  momentum: 0.937
  weight_decay: 0.0005

  # Loss weights
  box: 7.5
  cls: 0.5
  dfl: 1.5

  # Augmentation
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  translate: 0.1
  scale: 0.5
  fliplr: 0.5
  mosaic: 1.0

  # Misc
  verbose: false
  exist_ok: true

tent:
  lr: 0.001
  steps: 1

eval:
  device: 0
  half: false
  imgsz: 640
  batch: 64
  conf: 0.001
  iou: 0.6
