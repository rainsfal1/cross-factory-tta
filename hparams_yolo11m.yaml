run_name: sh17_yolo11m

pretrained_weights: null
model: models/yolo11m.pt

train:
  device: "0,2,3"   # DDP across 3 free A10s; GPU 1 is in use by another job
  batch: 144        # 48 per GPU × 3; same as yolov8m — safe on 22.5GB A10
  workers: 4        # 4/GPU × 3 = 12 total; proven optimal
  amp: true

  epochs: 100
  imgsz: 640
  optimizer: SGD
  lr0: 0.01          # kept at original tuned value — SGD+momentum, no linear scaling
  lrf: 0.01
  warmup_epochs: 3
  momentum: 0.937
  weight_decay: 0.0005

  box: 7.5
  cls: 0.5
  dfl: 1.5

  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  translate: 0.1
  scale: 0.5
  fliplr: 0.5
  mosaic: 1.0

  verbose: false
  exist_ok: true

tent:
  lr: 0.005        # starting point — re-sweep after training
  steps: 10
  adapt_batch: 16
  pin_tensors: true

sweep:
  steps: [1, 5, 10]
  lr: [0.001, 0.005, 0.01]

dua:
  decay_factor: 0.94
  min_momentum_constant: 0.005
  mom_pre: 0.1
  n_augments: 64          # paper default; reduce to 16 if VRAM is tight at 640px

eval:
  device: 0
  half: true
  imgsz: 640
  batch: 64
  workers: 4
  conf: 0.001
  iou: 0.6
  sanity_thresh: 0.60   # minimum SH17 val mAP50 to consider weights valid
